version: 2

builds:
  - main: ./cmd/hactl
    binary: hactl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X 'github.com/swifty99/hactl/internal/cmd.version={{.Version}}'
      - -X 'github.com/swifty99/hactl/internal/cmd.commit={{.ShortCommit}}'
      - -X 'github.com/swifty99/hactl/internal/cmd.date={{.Date}}'
      - -X 'github.com/swifty99/hactl/internal/cmd.testedHA={{.Env.TESTED_HA}}'

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

sboms:
  - artifacts: archive
    documents:
      - "${artifact}.sbom.json"

signs:
  - cmd: cosign
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

homebrew_casks:
  - repository:
      owner: swifty99
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: hactl
    homepage: https://github.com/swifty99/hactl
    description: "Home Assistant CLI — built for agentic workflows"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/hactl"]
          end

release:
  github:
    owner: swifty99
    name: hactl
  footer: |
    {{ if .Env.TESTED_HA }}
    ---
    **Tested against Home Assistant:** {{ .Env.TESTED_HA }}
    {{ end }}
