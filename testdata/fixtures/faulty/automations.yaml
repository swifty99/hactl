# Faulty automation test fixture – intentional errors for testing error paths
- id: broken_template
  alias: Broken Template
  description: Automation with intentional template error
  trigger:
    - platform: time_pattern
      hours: "/1"
  condition:
    - condition: template
      value_template: "{{ states('sensor.nonexistent_xyz') | float * 2 }}"
  action:
    - service: light.turn_on
      target:
        entity_id: light.bedroom
  mode: single

- id: always_off
  alias: Disabled Automation
  description: Automation that is permanently disabled
  trigger:
    - platform: time
      at: "12:00:00"
  condition: []
  action:
    - service: light.toggle
      target:
        entity_id: light.bedroom
  mode: single
  enabled: false

- id: working_simple
  alias: Working Simple
  description: A simple working automation for baseline comparison
  trigger:
    - platform: time
      at: "06:00:00"
  condition: []
  action:
    - service: light.turn_on
      target:
        entity_id: light.bedroom
      data:
        brightness: 200
  mode: single
