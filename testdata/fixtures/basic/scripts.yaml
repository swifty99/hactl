# Basic script test fixture — mimics Kino and standby scenarios
kino_start:
  alias: Kino Start
  description: Dims lights and sets TV to movie mode
  sequence:
    - service: light.turn_off
      target:
        entity_id: light.living_room
    - delay:
        seconds: 2
    - service: media_player.turn_on
      target:
        entity_id: media_player.tv
  mode: single

kino_ende:
  alias: Kino Ende
  description: Restores lights and turns off TV
  sequence:
    - service: light.turn_on
      target:
        entity_id: light.living_room
      data:
        brightness: 200
    - service: media_player.turn_off
      target:
        entity_id: media_player.tv
  mode: single

standby_activate:
  alias: Standby Activate
  description: Turns off non-essential devices for night
  sequence:
    - service: switch.turn_off
      target:
        entity_id: switch.office_monitor
    - service: light.turn_off
      target:
        entity_id: light.kitchen
  mode: single
